<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>鐵日誌 IRONLOG</title>
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#F3F4F7">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0C0F14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="鐵日誌">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="manifest" href="manifest.webmanifest">
</head>
<body><style>
  :root {
    --bg: #F3F4F7;
    --surface: #FFFFFF;
    --surface2: #ECEEF3;
    --ink: #171B23;
    --muted: #626B78;
    --faint: #8B93A1;
    --line: #E2E5EB;
    --accent: #2952E3;
    --accent-soft: rgba(41, 82, 227, .10);
    --accent-ink: #FFFFFF;
    --chart: #2952E3;
    --chart-dim: #B9C4DC;
    --good: #1F9D55;
    --good-soft: rgba(31, 157, 85, .12);
    --warn: #B97A1D;
    --warn-soft: rgba(232, 161, 58, .18);
    --bad: #C94747;
    --bad-soft: rgba(201, 71, 71, .10);
    --shadow: 0 1px 2px rgba(20, 24, 31, .05), 0 6px 20px rgba(20, 24, 31, .06);
    --tabbar-bg: rgba(255, 255, 255, .86);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0C0F14;
      --surface: #151A22;
      --surface2: #1D242F;
      --ink: #EDF0F4;
      --muted: #97A0AE;
      --faint: #67707F;
      --line: #232B37;
      --accent: #6C8CFF;
      --accent-soft: rgba(108, 140, 255, .16);
      --accent-ink: #0B0E14;
      --chart: #5F82FF;
      --chart-dim: #333E55;
      --good: #3DBA76;
      --good-soft: rgba(61, 186, 118, .16);
      --warn: #E8B04B;
      --warn-soft: rgba(232, 176, 75, .16);
      --bad: #E06C6C;
      --bad-soft: rgba(224, 108, 108, .14);
      --shadow: none;
      --tabbar-bg: rgba(18, 22, 29, .88);
    }
  }
  :root[data-theme="light"] {
    --bg: #F3F4F7;
    --surface: #FFFFFF;
    --surface2: #ECEEF3;
    --ink: #171B23;
    --muted: #626B78;
    --faint: #8B93A1;
    --line: #E2E5EB;
    --accent: #2952E3;
    --accent-soft: rgba(41, 82, 227, .10);
    --accent-ink: #FFFFFF;
    --chart: #2952E3;
    --chart-dim: #B9C4DC;
    --good: #1F9D55;
    --good-soft: rgba(31, 157, 85, .12);
    --warn: #B97A1D;
    --warn-soft: rgba(232, 161, 58, .18);
    --bad: #C94747;
    --bad-soft: rgba(201, 71, 71, .10);
    --shadow: 0 1px 2px rgba(20, 24, 31, .05), 0 6px 20px rgba(20, 24, 31, .06);
    --tabbar-bg: rgba(255, 255, 255, .86);
  }
  :root[data-theme="dark"] {
    --bg: #0C0F14;
    --surface: #151A22;
    --surface2: #1D242F;
    --ink: #EDF0F4;
    --muted: #97A0AE;
    --faint: #67707F;
    --line: #232B37;
    --accent: #6C8CFF;
    --accent-soft: rgba(108, 140, 255, .16);
    --accent-ink: #0B0E14;
    --chart: #5F82FF;
    --chart-dim: #333E55;
    --good: #3DBA76;
    --good-soft: rgba(61, 186, 118, .16);
    --warn: #E8B04B;
    --warn-soft: rgba(232, 176, 75, .16);
    --bad: #E06C6C;
    --bad-soft: rgba(224, 108, 108, .14);
    --shadow: none;
    --tabbar-bg: rgba(18, 22, 29, .88);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto,
      "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior-y: none;
  }
  button { font: inherit; color: inherit; background: none; border: 0; padding: 0; cursor: pointer; }
  input, select { font: inherit; color: inherit; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 6px; }

  .app { max-width: 520px; margin: 0 auto; padding: 0 16px calc(96px + env(safe-area-inset-bottom, 0px)); }
  .app.has-mini { padding-bottom: calc(148px + env(safe-area-inset-bottom, 0px)); }

  /* ── top bar ─────────────────────────── */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 2px 6px;
    padding-top: calc(18px + env(safe-area-inset-top, 0px));
  }
  .wordmark { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 800; letter-spacing: .18em; color: var(--ink); }
  .wordmark .plate { width: 10px; height: 10px; border-radius: 3px; background: var(--accent); display: inline-block; }
  .wordmark .zh { color: var(--faint); letter-spacing: .3em; font-weight: 600; }

  /* ── type ─────────────────────────── */
  .eyebrow { font-size: 11px; font-weight: 700; letter-spacing: .14em; color: var(--faint); text-transform: uppercase; }
  .h1 { font-size: 26px; font-weight: 800; letter-spacing: -.01em; margin: 2px 0 0; text-wrap: balance; }
  .sub { font-size: 14px; color: var(--muted); }
  .num { font-variant-numeric: tabular-nums; }
  .section { margin-top: 26px; }
  .section-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 10px; padding: 0 2px; }
  .section-head .eyebrow { display: block; }
  .section-head h2 { font-size: 17px; font-weight: 800; margin: 2px 0 0; }

  /* ── cards & lists ─────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 16px;
    box-shadow: var(--shadow);
    padding: 16px;
  }
  .card + .card { margin-top: 10px; }
  .list-item {
    display: flex; align-items: center; gap: 12px; width: 100%; text-align: left;
    background: var(--surface); border: 1px solid var(--line); border-radius: 14px;
    padding: 13px 14px; box-shadow: var(--shadow);
  }
  .list-item + .list-item { margin-top: 8px; }
  .list-item .grow { flex: 1; min-width: 0; }
  .list-item .title { font-weight: 700; font-size: 15px; }
  .list-item .meta { font-size: 12.5px; color: var(--muted); margin-top: 2px; }
  .chev { color: var(--faint); flex: none; }

  .gdot { width: 8px; height: 8px; border-radius: 50%; flex: none; display: inline-block; }

  /* ── buttons ─────────────────────────── */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    min-height: 48px; padding: 0 18px; border-radius: 13px;
    font-size: 16px; font-weight: 700;
    background: var(--accent); color: var(--accent-ink);
    transition: transform .06s ease, opacity .15s ease;
  }
  .btn:active { transform: scale(.97); }
  .btn.block { width: 100%; }
  .btn.ghost { background: var(--surface2); color: var(--ink); }
  .btn.soft { background: var(--accent-soft); color: var(--accent); }
  .btn.danger { background: var(--bad-soft); color: var(--bad); }
  .btn.small { min-height: 38px; padding: 0 13px; font-size: 14px; border-radius: 11px; }
  .btn.tiny { min-height: 32px; padding: 0 10px; font-size: 13px; border-radius: 9px; }
  .iconbtn { width: 36px; height: 36px; border-radius: 10px; display: inline-flex; align-items: center; justify-content: center; color: var(--faint); flex: none; }
  .iconbtn:active { background: var(--surface2); }
  .confirming { width: auto !important; min-width: 0; padding: 0 10px !important; color: var(--bad) !important; background: var(--bad-soft) !important; font-size: 13px; font-weight: 800; white-space: nowrap; }
  #ringArc { transition: stroke-dashoffset .2s linear; }

  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 11px; border-radius: 999px; font-size: 12.5px; font-weight: 700;
    background: var(--surface2); color: var(--muted); white-space: nowrap;
  }
  .chip.accent { background: var(--accent-soft); color: var(--accent); }
  .chip.good { background: var(--good-soft); color: var(--good); }
  .chip.warn { background: var(--warn-soft); color: var(--warn); }

  /* ── inputs ─────────────────────────── */
  .input {
    width: 100%; min-height: 48px; padding: 10px 14px;
    background: var(--surface2); border: 1px solid transparent; border-radius: 12px;
    font-size: 16px; font-weight: 600;
  }
  .input:focus { outline: none; border-color: var(--accent); background: var(--surface); }
  .select {
    width: 100%; min-height: 46px; padding: 8px 12px;
    background: var(--surface2); border: 1px solid transparent; border-radius: 12px;
    font-size: 15px; font-weight: 600; appearance: none;
    background-image: linear-gradient(45deg, transparent 50%, var(--faint) 50%), linear-gradient(135deg, var(--faint) 50%, transparent 50%);
    background-position: calc(100% - 18px) 55%, calc(100% - 13px) 55%;
    background-size: 5px 5px; background-repeat: no-repeat;
  }

  /* ── stat tiles ─────────────────────────── */
  .tiles { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .tile { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; padding: 12px 12px 11px; box-shadow: var(--shadow); min-width: 0; }
  .tile .t-label { font-size: 11.5px; font-weight: 600; color: var(--muted); }
  .tile .t-value { font-size: 21px; font-weight: 800; margin-top: 3px; letter-spacing: -.01em; white-space: nowrap; }
  .tile .t-value small { font-size: 12px; font-weight: 700; color: var(--faint); margin-left: 2px; }
  .tile .t-delta { font-size: 11.5px; font-weight: 700; margin-top: 2px; }
  .tile .t-delta.down { color: var(--good); }
  .tile .t-delta.up { color: var(--warn); }
  .tile .t-delta.flat { color: var(--faint); }

  /* ── session / set rows ─────────────────────────── */
  .ex-card { padding: 14px 14px 12px; }
  .ex-head { display: flex; align-items: center; gap: 9px; margin-bottom: 10px; }
  .ex-head .name { font-size: 16px; font-weight: 800; flex: 1; min-width: 0; }
  .setrow {
    display: grid; grid-template-columns: 42px 1fr 18px 1fr 34px; gap: 7px; align-items: center;
    margin-top: 7px;
  }
  .setrow .x { text-align: center; color: var(--faint); font-weight: 700; }
  .setrow input {
    width: 100%; min-height: 46px; text-align: center;
    background: var(--surface2); border: 1px solid transparent; border-radius: 11px;
    font-size: 17px; font-weight: 700; font-variant-numeric: tabular-nums; padding: 4px 6px;
  }
  .setrow input:focus { outline: none; border-color: var(--accent); background: var(--surface); }
  .setrow.done input { color: var(--faint); background: transparent; border-color: var(--line); }
  .check {
    width: 42px; height: 46px; border-radius: 11px; display: flex; align-items: center; justify-content: center;
    background: var(--surface2); color: var(--faint);
  }
  .setrow.done .check { background: var(--good-soft); color: var(--good); }
  .rm { width: 34px; height: 46px; display: flex; align-items: center; justify-content: center; color: var(--faint); border-radius: 10px; }
  .ex-actions { display: flex; gap: 8px; margin-top: 12px; }
  .prchip { font-size: 10.5px; font-weight: 800; letter-spacing: .06em; background: var(--warn-soft); color: var(--warn); border-radius: 6px; padding: 2px 6px; }

  .cardio-row { display: grid; grid-template-columns: 42px 1fr 1fr 1fr; gap: 7px; align-items: center; margin-top: 7px; }
  .cardio-row .unitwrap { position: relative; min-width: 0; }
  .cardio-row input {
    width: 100%; min-width: 0; min-height: 46px; text-align: center;
    background: var(--surface2); border: 1px solid transparent; border-radius: 11px;
    font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums; padding: 4px 26px 4px 6px;
  }
  .cardio-row input:focus { outline: none; border-color: var(--accent); background: var(--surface); }
  .cardio-row .unit { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); font-size: 11px; color: var(--faint); font-weight: 700; pointer-events: none; }
  .exkcal { font-size: 12px; font-weight: 700; color: var(--muted); white-space: nowrap; flex: none; }

  .sess-bar { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .sess-bar .big { font-size: 25px; font-weight: 800; letter-spacing: -.01em; }
  .sess-bar .lbl { font-size: 11px; color: var(--muted); font-weight: 600; margin-top: -1px; white-space: nowrap; }

  /* ── hero cta ─────────────────────────── */
  .hero { padding: 20px 18px; }
  .hero .plan-line { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }

  /* ── plan grid ─────────────────────────── */
  .weekrow { display: grid; grid-template-columns: 52px 1fr; gap: 10px; align-items: center; padding: 7px 0; }
  .weekrow .d { font-weight: 800; font-size: 14px; color: var(--muted); }
  .weekrow.today .d { color: var(--accent); }
  .weekrow.today .d::after { content: "・今天"; font-size: 11px; font-weight: 700; }

  /* ── timer ─────────────────────────── */
  .seg { display: grid; grid-template-columns: 1fr 1fr; background: var(--surface2); border-radius: 13px; padding: 4px; gap: 4px; }
  .seg button { min-height: 42px; border-radius: 10px; font-weight: 700; font-size: 14.5px; color: var(--muted); }
  .seg button.on { background: var(--surface); color: var(--ink); box-shadow: var(--shadow); }
  .ring-wrap { position: relative; width: min(78vw, 300px); margin: 22px auto 8px; }
  .ring-wrap svg { display: block; width: 100%; height: auto; }
  .ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; }
  .ring-digits { font-size: clamp(56px, 17vw, 72px); font-weight: 200; letter-spacing: -.02em; font-variant-numeric: tabular-nums; line-height: 1; }
  .ring-sub { font-size: 13px; font-weight: 700; color: var(--muted); letter-spacing: .08em; }
  .preset-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 14px 0 4px; }
  .preset-row .chip { min-height: 36px; padding: 0 14px; font-size: 14px; }
  .preset-row .chip.on { background: var(--accent-soft); color: var(--accent); }
  .timer-ctl { display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 10px; margin-top: 16px; align-items: center; }
  .hiit-cfg { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 14px; }
  .hiit-cfg label { display: block; font-size: 11.5px; font-weight: 700; color: var(--muted); margin-bottom: 5px; text-align: center; }
  .hiit-cfg input {
    width: 100%; min-height: 46px; text-align: center;
    background: var(--surface2); border: 1px solid transparent; border-radius: 11px;
    font-size: 17px; font-weight: 700; font-variant-numeric: tabular-nums;
  }
  .hiit-cfg input:focus { outline: none; border-color: var(--accent); background: var(--surface); }

  .mini-timer {
    position: fixed; left: 50%; transform: translateX(-50%);
    bottom: calc(78px + env(safe-area-inset-bottom, 0px));
    width: min(calc(100% - 32px), 488px);
    background: var(--ink); color: var(--bg);
    border-radius: 14px; padding: 10px 10px 10px 16px;
    display: none; align-items: center; gap: 12px; z-index: 40;
    box-shadow: 0 8px 24px rgba(0,0,0,.25);
  }
  .mini-timer.show { display: flex; }
  .mini-timer .mt-digits { font-size: 20px; font-weight: 800; font-variant-numeric: tabular-nums; }
  .mini-timer .mt-label { font-size: 12px; opacity: .7; font-weight: 600; }
  .mini-timer .grow { flex: 1; }
  .mini-timer button { color: inherit; font-weight: 700; font-size: 13.5px; padding: 8px 12px; border-radius: 9px; background: rgba(128,128,128,.22); }

  /* ── tab bar ─────────────────────────── */
  .tabbar {
    position: fixed; left: 50%; transform: translateX(-50%);
    bottom: 0; width: min(100%, 520px); z-index: 50;
    display: grid; grid-template-columns: repeat(4, 1fr);
    padding: 8px 10px calc(10px + env(safe-area-inset-bottom, 0px));
    background: var(--tabbar-bg);
    -webkit-backdrop-filter: blur(16px); backdrop-filter: blur(16px);
    border-top: 1px solid var(--line);
  }
  .tab { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px 0 4px; border-radius: 12px; color: var(--faint); }
  .tab .tlabel { font-size: 11px; font-weight: 700; }
  .tab.on { color: var(--accent); }

  /* ── sheet ─────────────────────────── */
  .overlay { position: fixed; inset: 0; background: rgba(10, 13, 18, .45); z-index: 90; opacity: 0; transition: opacity .22s ease; }
  .overlay.show { opacity: 1; }
  .sheet {
    position: fixed; left: 50%; transform: translate(-50%, 105%);
    bottom: 0; width: min(100%, 520px); max-height: 88vh; max-height: 88dvh; z-index: 95;
    background: var(--surface); border-radius: 20px 20px 0 0;
    display: flex; flex-direction: column;
    transition: transform .28s cubic-bezier(.32, .72, .25, 1);
    border: 1px solid var(--line); border-bottom: 0;
  }
  .sheet.show { transform: translate(-50%, 0); }
  .sheet-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px 10px; flex: none; }
  .sheet-head h3 { margin: 0; font-size: 18px; font-weight: 800; }
  .sheet-body { overflow-y: auto; padding: 2px 18px calc(24px + env(safe-area-inset-bottom, 0px)); -webkit-overflow-scrolling: touch; }
  .grabber { width: 40px; height: 4px; border-radius: 2px; background: var(--line); margin: 10px auto 0; flex: none; }

  /* ── picker ─────────────────────────── */
  .search { position: sticky; top: 0; background: var(--surface); padding: 4px 0 10px; z-index: 2; }
  .groupchips { display: flex; gap: 7px; overflow-x: auto; padding: 2px 2px 12px; scrollbar-width: none; }
  .groupchips::-webkit-scrollbar { display: none; }
  .groupchips .chip { flex: none; min-height: 34px; }
  .groupchips .chip.on { background: var(--ink); color: var(--surface); }
  .pick-item { display: flex; align-items: center; gap: 11px; width: 100%; text-align: left; padding: 12px 6px; border-bottom: 1px solid var(--line); }
  .pick-item:last-child { border-bottom: 0; }
  .pick-item .pname { font-weight: 700; font-size: 15px; flex: 1; min-width: 0; }
  .pick-item .plast { font-size: 12px; color: var(--faint); }
  .pick-item .pen { display: block; font-size: 11.5px; color: var(--accent); font-weight: 700; margin-top: 1px; letter-spacing: .01em; }
  .pick-sec { font-size: 11px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; color: var(--faint); padding: 15px 2px 5px; }
  .pick-sec:first-child { padding-top: 4px; }
  .pick-item .padd { width: 32px; height: 32px; border-radius: 9px; background: var(--accent-soft); color: var(--accent); display: flex; align-items: center; justify-content: center; flex: none; }
  .pick-item.added .padd { background: var(--good-soft); color: var(--good); }

  /* ── charts ─────────────────────────── */
  .chart { position: relative; margin-top: 4px; }
  .chart svg { display: block; width: 100%; height: auto; }
  .tip {
    position: absolute; pointer-events: none; z-index: 5;
    background: var(--ink); color: var(--bg);
    border-radius: 9px; padding: 6px 10px; font-size: 12.5px; font-weight: 700;
    transform: translate(-50%, -118%); white-space: nowrap;
    box-shadow: 0 4px 14px rgba(0,0,0,.18);
    display: none;
  }
  .tip small { display: block; font-weight: 600; opacity: .65; font-size: 11px; }
  .axis-t { font-size: 10.5px; fill: var(--faint); font-variant-numeric: tabular-nums; font-weight: 600; }
  .grid-l { stroke: var(--line); stroke-width: 1; }

  .empty { text-align: center; padding: 30px 16px; color: var(--muted); font-size: 14px; }
  .empty .big { font-size: 15px; font-weight: 700; color: var(--ink); margin-bottom: 4px; }

  .wlist-row { display: flex; align-items: center; gap: 10px; padding: 9px 2px; border-bottom: 1px solid var(--line); font-size: 14.5px; }
  .wlist-row:last-child { border-bottom: 0; }
  .wlist-row .d { color: var(--muted); flex: 1; }
  .wlist-row .v { font-weight: 800; }

  /* ── toast ─────────────────────────── */
  .toast {
    position: fixed; left: 50%; transform: translateX(-50%) translateY(-8px);
    top: calc(14px + env(safe-area-inset-top, 0px)); z-index: 120;
    background: var(--ink); color: var(--bg);
    padding: 11px 18px; border-radius: 12px; font-size: 14.5px; font-weight: 700;
    box-shadow: 0 8px 24px rgba(0,0,0,.22);
    opacity: 0; pointer-events: none; transition: opacity .2s ease, transform .2s ease;
    max-width: min(88vw, 480px); text-align: center;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  textarea.io {
    width: 100%; min-height: 150px; border-radius: 12px; border: 1px solid var(--line);
    background: var(--surface2); padding: 12px; font-size: 12px; font-family: ui-monospace, Consolas, monospace;
    color: var(--ink); resize: vertical;
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }
</style>

<div class="app" id="app">
  <header class="topbar">
    <span class="wordmark"><span class="plate"></span>IRONLOG <span class="zh">鐵日誌</span></span>
